<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>404 — ryan shah</title>
        <link rel="icon" type="image/png" href="assets/favicon.png">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://use.typekit.net/vyf6nqz.css">

        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                background-color: #f5f5f5;
                font-family: "Montserrat", sans-serif;
                color: #0a0a0a;
                -webkit-font-smoothing: antialiased;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .container {
                padding: 32px;
                display: flex;
                align-items: flex-end;
                gap: 48px;
            }

            /* left: huge number */
            .number {
                font-family: "Bebas-Kai";
                font-size: 200px;
                line-height: 1;
                color: orangered;
                letter-spacing: -2px;
                flex-shrink: 0;
            }

            /* right: stacked text */
            .right {
                padding-bottom: 12px;
            }

            .eyebrow {
                font-family: "DM Mono", monospace;
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                color: rgba(0, 0, 0, 0.3);
                margin-bottom: 12px;
            }

            .divider {
                height: 1px;
                background: rgba(0, 0, 0, 0.08);
                margin-bottom: 16px;
            }

            .message {
                font-size: 15px;
                font-weight: 400;
                color: #555555;
                line-height: 1.85;
                margin-bottom: 24px;
            }

            .back-link {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-family: "DM Mono", monospace;
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                text-decoration: none;
                color: rgba(0, 0, 0, 0.3);
                transition: color 0.2s ease;
            }

            .back-link:hover { color: orangered; }

            @keyframes fadeIn {
                from { opacity: 0; }
                to   { opacity: 1; }
            }

            body { animation: fadeIn 0.3s ease; }

            @media (max-width: 600px) {
                .container { flex-direction: column; align-items: flex-start; gap: 16px; }
                .number { font-size: 120px; }
            }
        </style>

        <script>
            document.addEventListener('click', function(e) {
                const link = e.target.closest('a[href]');
                if (!link) return;
                const href = link.getAttribute('href');
                if (!href || href.startsWith('http') || href.startsWith('#')) return;
                e.preventDefault();
                document.body.style.transition = 'opacity 0.25s ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = href; }, 250);
            });
        </script>
    </head>

    <body>
        <div class="container">
            <div class="number">404</div>
            <div class="right">
                <p class="eyebrow">Page not found</p>
                <div class="divider"></div>
                <p class="message">this page doesn't exist.</p>
                <a href="index.html" class="back-link">← go home</a>
            </div>
        </div>
    </body>
</html>
